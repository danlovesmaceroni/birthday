<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday BEESA!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffd6e7, #fff7fb);
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 52px;
      color: #e84378;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 20px;
    }

    button {
      background: #e84378;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #d6336c;
    }

    .hidden {
      display: none;
    }

    .message-box {
      margin-top: 30px;
      padding: 25px;
      background: #fff0f6;
      border: 1px solid #ffc2d6;
      border-radius: 20px;
      max-width: 750px;
      margin-left: auto;
      margin-right: auto;
    }

    .photos {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .photos img {
      width: 300px;
      max-width: 90%;
      height: 360px;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .music {
      margin-top: 30px;
    }

    iframe {
      border-radius: 16px;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Happy Birthday, BEESA! 💖</h1>
    <p>
      I made this little surprise just for you.
    </p>
    <p>
      Click below to open it.
    </p>

    <button onclick="openSurprise()">Open Surprise 🎁</button>

    <div id="surprise" class="hidden">
      <div class="message-box">
        <p>
          You make my life better every single day. I’m so lucky to have you.
          I love you so much. 💕
        </p>
      </div>

      <div class="music">
        <p><b>Glue Song — beabadoobee</b></p>
        <iframe
          style="border:0;"
          src="https://open.spotify.com/embed/track/3iBgrkexCzVuPy4O9vx7Mf?utm_source=generator"
          width="100%"
          height="152"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
      </div>

      <div class="photos">
        <img src="RISA.jpg" alt="Photo 1">
        <img src="ENNY.png" alt="Photo 2">
      </div>
    </div>
  </div>

  <script>
    function openSurprise() {
      document.getElementById("surprise").classList.remove("hidden");
    }
  </script>
</body>
</html>

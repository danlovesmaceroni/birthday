<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ffd6e0, #fff);
      color: #333;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 48px;
      color: #ff4d88;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      max-width: 700px;
      margin: 0 auto 20px auto;
      line-height: 1.6;
    }

    button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #e63e75;
    }

    .hidden-message {
      display: none;
      margin-top: 30px;
      font-size: 24px;
      color: #d6336c;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Happy Birthday My Love ❤️</h1>
    <p>
      I made this little website just for you because you mean so much to me.
    </p>
    <p>
      Click the button below for your surprise.
    </p>

    <button onclick="showMessage()">Open Surprise 🎁</button>

    <div class="hidden-message" id="surpriseMessage">
      You make my life better every single day. I’m so lucky to have you. I love you so much. 💖
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("surpriseMessage").style.display = "block";
    }
  </script>
</body>
</html>
